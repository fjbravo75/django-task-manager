<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{% static 'tasks/styles.css' %}">
</head>
<body>
    <main class="app-shell">
        <section class="form-screen">
            <header class="screen-header">
                <div class="screen-header-top">
                    <div class="screen-header-copy">
                        <h1 class="screen-title">{{ screen_title }}</h1>
                        <p class="screen-subtitle">{{ screen_subtitle }}</p>
                    </div>

                    <a class="text-link" href="{% url 'task_detail' task.pk %}">Volver al detalle</a>
                </div>
            </header>

            <section class="form-panel">
                <div class="form-panel-header">
                    <h2 class="panel-title">{{ panel_title }}</h2>
                    <p class="panel-subtitle">{{ panel_subtitle }}</p>
                </div>

                <dl class="task-detail-grid">
                    <div class="task-detail-row">
                        <dt class="task-detail-label">Título</dt>
                        <dd class="task-detail-value">{{ task.title }}</dd>
                    </div>

                    <div class="task-detail-row task-detail-row-description">
                        <dt class="task-detail-label">Descripción</dt>
                        <dd class="task-detail-value task-detail-value-description">{% if task.description %}{{ task.description }}{% else %}Sin descripción.{% endif %}</dd>
                    </div>
                </dl>

                <form method="post" class="task-form-grid">
                    {% csrf_token %}

                    <div class="form-actions">
                        <a class="button-secondary" href="{% url 'task_detail' task.pk %}">Cancelar</a>
                        <button class="button-primary button-dark" type="submit">Confirmar borrado</button>
                    </div>
                </form>
            </section>
        </section>
    </main>
</body>
</html>
