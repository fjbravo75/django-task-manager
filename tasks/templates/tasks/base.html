{% load static %}

<html lang="es">

    <title>{% block title %}django-task-manager{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'tasks/styles.css' %}">
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 antialiased">

        {% block content %}{% endblock %}

</body>
</html>
